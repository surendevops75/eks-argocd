Kubernetes Namespace Example

This manifest creates a dedicated namespace named roboshop in Kubernetes.

Namespaces are used to logically separate applications and resources within the same Kubernetes cluster. They help organize workloads, implement access control, apply resource quotas, and avoid naming conflicts between applications.

In this example, the namespace is labeled to identify:

The application/project (roboshop)
The environment (development)

This is a common practice in enterprise Kubernetes environments.

Workflow File
# --------------------------------------------------------
# API VERSION
# --------------------------------------------------------

# Core Kubernetes API
apiVersion: v1

# --------------------------------------------------------
# RESOURCE TYPE
# --------------------------------------------------------

# Kubernetes Namespace resource
kind: Namespace

metadata:

  # Namespace name
  name: roboshop

  # Labels attached to namespace
  labels:

    # Environment information
    environment: development

    # Project/Application name
    project: roboshop
Important Concepts
Namespace
kind: Namespace

A Namespace is a logical boundary inside a Kubernetes cluster.

Example:

Kubernetes Cluster
│
├── default
├── kube-system
├── monitoring
├── roboshop
└── expense

Each namespace can contain its own:

Pods
Deployments
Services
ConfigMaps
Secrets
Ingresses
Namespace Name
name: roboshop

Creates a namespace called:

roboshop

Resources can later be deployed into this namespace:

metadata:
  namespace: roboshop

Example:

apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
Labels
labels:

Labels are metadata attached to Kubernetes resources.

They help with:

Organization
Filtering
Automation
Resource grouping
Governance
Environment Label
environment: development

Identifies which environment the namespace belongs to.

Common values:

development
qa
uat
staging
production

Useful for:

Monitoring
Cost tracking
Security policies
Resource reporting
Project Label
project: roboshop

Identifies the application or business project.

Useful when multiple applications share the same cluster.

Example:

project=roboshop
project=expense
project=monitoring
Viewing Namespace Details

List namespaces:

kubectl get ns

View namespace labels:

kubectl get ns roboshop --show-labels

Describe namespace:

kubectl describe ns roboshop
Real DevOps Use Cases
Application Isolation

Separate applications into different namespaces:

roboshop
expense
monitoring
logging
Environment Separation

Use different namespaces for environments:

roboshop-dev
roboshop-qa
roboshop-prod
Access Control

Using Kubernetes RBAC:

Developers
   ↓
Access only roboshop namespace

Platform Team
   ↓
Access entire cluster
Resource Quotas

Apply CPU, memory, and storage limits per namespace.

Example:

roboshop namespace
  ├─ CPU Limit
  ├─ Memory Limit
  └─ Storage Limit
Namespace Deployment Flow
Create Namespace
        ↓
Deploy Applications
        ↓
Create Services
        ↓
Create ConfigMaps & Secrets
        ↓
Manage Resources Independently
Benefits of Namespaces
Better resource organization
Environment isolation
Simplified access control
Support for resource quotas
Reduced naming conflicts
Easier cluster management
Best Practice

Avoid deploying all workloads into:

default

Instead, create dedicated namespaces for:

Applications
Teams
Environments

This improves scalability and maintainability.

Why This Manifest Is Important

Namespaces are one of the most fundamental concepts in Kubernetes.

They provide:

Logical isolation
Multi-team support
Better governance
Enterprise-grade cluster organization

Almost every production Kubernetes environment relies heavily on namespaces.

How to Deploy

Save as:

roboshop-namespace.yaml

Apply the manifest:

kubectl apply -f roboshop-namespace.yaml

Verify creation:

kubectl get ns

Expected output:

NAME       STATUS   AGE
roboshop   Active